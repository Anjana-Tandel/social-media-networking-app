<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/all.min.css">
    
</head>
<body>
    <div id="header-left">
        <i class="fas fa-fire"></i>
        <span>ConnectHub</span>
    </div>
    <div id="header-right">
        <i class="fas fa-bell"></i>
        <span>Stay Connected</span>
    </div>
<section id="sign-in">
    
    <p><b>Welcome!</b> Connect and share your moments !! </p>

<form class="form_container" id="sign-in-container">
    <h1>Login</h1>
    <div id="user_container"><input type="text" placeholder="Username"required="true" id="Username"class="input_box">
        <i class="fa-solid fa-user" id="user_icon"></i>
    </div>
    <div id="password_container"><input type="password" placeholder="Password" required="true" id="Password" class="input_box">
        <i class="fa-solid fa-lock" id="lock_icon" class="NotChanged"></i>
    </div>

    <div id="rem_forgot">
        
        <label>Show Password <input type="checkbox" id="showPassword" ></label>
        <a href="forgot_password.html">Forgot Password?</a>

    </div>
    <div id="sign_up">
        <button id="Login" type="submit">Sign In</button>
        Don't have an account ?<a href="register.html">Sign Up Now</a>
    </div>
</form>

</section>
<script src="login.js"></script>
</body>

</body>
</html>
